name: Kubernetes-el CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: actions/setup-python@v6
    - uses: pre-commit/action@v3.0.1

  test-against-emacs-stable-releases:
    runs-on: ubuntu-latest
    environment: ci
    strategy:
      matrix:
        emacs_version:
          - 28.2
          - 29.4
          - 30.2
          - release-snapshot
    env:
      EMACS_VERSION: ${{ matrix.emacs_version }}
    steps:
      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Setup Python (for Cask)
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Setup Cask
        uses: conao3/setup-cask@master
        with:
          version: "snapshot"

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install
        id: install
        run: |
          emacs --version
          cask build --verbose
          make build

      - name: Test
        if: steps.install.outcome == 'success' && steps.install.conclusion == 'success'
        run: |
          make test

      - name: Upload coverage
        if: steps.install.outcome == 'success' && steps.install.conclusion == 'success'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: EMACS_VERSION
          files: ./coverage/lcov-ert.info,./coverage/lcov-buttercup.info
          fail_ci_if_error: true
          verbose: true

  test-against-emacs-snapshot-release:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: "snapshot"

      - name: Setup Python (for Cask)
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Setup Cask
        uses: conao3/setup-cask@master
        with:
          version: "snapshot"

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install
        id: install
        run: |
          emacs --version
          cask build --verbose
          make build

      - name: Test
        continue-on-error: true
        id: test
        if: steps.install.outcome == 'success' && steps.install.conclusion == 'success'
        run: |
          make test

      - name: Warn if snapshot test failed
        if: steps.test.outcome == 'failure'
        run: |
          echo "### ⚠️ Optional test-against-emacs-snapshot job failed ⚠️" >> "$GITHUB_STEP_SUMMARY"
